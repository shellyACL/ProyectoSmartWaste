services:
  db:
    image: postgis/postgis:15-3.3  
    container_name: smartwaste_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin 
      POSTGRES_DB: smartwaste
    ports:
      - "5433:5432"
       
    volumes:
      - postgres_data:/var/lib/postgresql/data 

volumes:
  postgres_data: